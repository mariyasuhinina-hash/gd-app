<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GD</title>

<style>
body{
margin:0;
background:#111827;
color:white;
font-family:Arial,sans-serif;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#1b2432;
}

.logo{
font-size:28px;
font-weight:bold;
color:#55ff55;
}

.card{
margin:15px;
padding:20px;
background:#202b3d;
border-radius:15px;
}

.btn{
margin-top:15px;
width:100%;
padding:15px;
background:#3a7cff;
border:none;
border-radius:12px;
color:white;
font-size:18px;
}

.menu{
position:fixed;
bottom:0;
left:0;
right:0;
background:#1b2432;
display:flex;
justify-content:space-around;
padding:15px;
}
</style>

</head>

<body>

<header>
<div class="logo">🐸 GD</div>
<div>⭐ 0</div>
</header>

<div class="card">
<h2>Добро пожаловать</h2>
<p>Первая версия приложения GD.</p>

<button class="btn">Скоро кейсы</button>
</div>

<div class="card">
<h3>Лидерборд</h3>
<p>Место: 0</p>
</div>

<div class="menu">
<div>⬆️</div>
<div>⚒️</div>
<div>📦</div>
<div>🏆</div>
<div>👥</div>
</div>

</body>
</html>
